x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

services:

  # ═══════ TLS REVERSE PROXY ═══════
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "8443:8443"    # Keycloak
      - "3443:3443"    # Grafana
      - "8444:8444"    # Nextcloud
      - "3444:3444"    # Gitea
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/server.crt:/etc/nginx/ssl/server.crt:ro
      - ./certs/server.key:/etc/nginx/ssl/server.key:ro
    depends_on:
      keycloak:
        condition: service_healthy
      grafana:
        condition: service_healthy
    networks:
      - iam-frontend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      <<: *healthcheck-defaults

  # ═══════ KEYCLOAK — PRODUCTION MODE ═══════
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: >
      start
      --hostname=${KC_HOSTNAME}
      --hostname-strict=false
      --proxy-headers=xforwarded
      --http-enabled=true
      --http-port=8080
      --db=postgres
      --db-url=jdbc:postgresql://keycloak-db:5432/${POSTGRES_DB}
      --db-username=${POSTGRES_USER}
      --db-password=${KC_DB_PASSWORD}
      --log-level=INFO
      --spi-events-listener-jboss-logging-success-level=info
      --spi-events-listener-jboss-logging-error-level=warn
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_FEATURES: "preview,passkeys"
      JAVA_OPTS_APPEND: >-
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=500
        -XX:+UseStringDeduplication
        -Djava.net.preferIPv4Stack=true
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - iam-frontend
      - iam-backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"
        reservations:
          memory: 768M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -qE 'HTTP|html' && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ═══════ POSTGRESQL ═══════
  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    command: >
      postgres
        -c max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_level=replica
        -c max_wal_size=1GB
        -c log_min_duration_statement=500
        -c log_connections=on
        -c log_disconnections=on
        -c log_lock_waits=on
    networks:
      - iam-backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ═══════ OPENLDAP ═══════
  openldap:
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_CONFIG_PASSWORD: ${LDAP_CONFIG_PASSWORD}
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: readonly
      LDAP_READONLY_USER_PASSWORD: ${LDAP_READONLY_USER_PASSWORD}
      LDAP_TLS: "true"
      LDAP_TLS_CRT_FILENAME: server.crt
      LDAP_TLS_KEY_FILENAME: server.key
      LDAP_TLS_CA_CRT_FILENAME: ca.crt
      LDAP_TLS_ENFORCE: "false"
      LDAP_TLS_VERIFY_CLIENT: "try"
      LDAP_LOG_LEVEL: 256
    volumes:
      - openldap-data:/var/lib/ldap
      - openldap-config:/etc/ldap/slapd.d
      - ./certs/server.crt:/container/service/slapd/assets/certs/server.crt
      - ./certs/server.key:/container/service/slapd/assets/certs/server.key
      - ./certs/ca.crt:/container/service/slapd/assets/certs/ca.crt
    networks:
      - iam-backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:389 -b '' -s base '(objectclass=*)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    restart: unless-stopped
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    depends_on:
      openldap:
        condition: service_healthy
    networks:
      - iam-frontend
      - iam-backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"

  # ═══════ SERVICE PROVIDERS ═══════
  nextcloud:
    image: nextcloud:30-apache
    restart: unless-stopped
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-ncadmin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-CHANGE_ME}
      NEXTCLOUD_TRUSTED_DOMAINS: "nextcloud.iam-lab.local localhost"
      OVERWRITEPROTOCOL: "https"
    volumes:
      - nextcloud-data:/var/www/html
    networks:
      - iam-frontend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/status.php"]
      <<: *healthcheck-defaults

  grafana:
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    user: "472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GF_SECURITY_SECRET_KEY}
      GF_SERVER_ROOT_URL: "https://grafana.iam-lab.local:3443"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak SSO"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email roles"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://keycloak.iam-lab.local:8443/realms/enterprise/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://keycloak:8080/realms/enterprise/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://keycloak:8080/realms/enterprise/protocol/openid-connect/userinfo"
      GF_AUTH_GENERIC_OAUTH_TLS_SKIP_VERIFY_INSECURE: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_CONTENT_SECURITY_POLICY: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - iam-frontend
      - iam-backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      <<: *healthcheck-defaults

  gitea:
    image: gitea/gitea:1.23
    restart: unless-stopped
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: "https://gitea.iam-lab.local:3444/"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__openid__ENABLE_OPENID_SIGNIN: "true"
    volumes:
      - gitea-data:/data
    networks:
      - iam-frontend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      <<: *healthcheck-defaults

  # ═══════ MONITORING ═══════
  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - iam-backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      <<: *healthcheck-defaults

  promtail:
    image: grafana/promtail:3.4.2
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - iam-backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"

volumes:
  keycloak-db-data:
    name: iam-keycloak-db
  openldap-data:
    name: iam-openldap-data
  openldap-config:
    name: iam-openldap-config
  nextcloud-data:
    name: iam-nextcloud-data
  grafana-data:
    name: iam-grafana-data
  gitea-data:
    name: iam-gitea-data
  loki-data:
    name: iam-loki-data

networks:
  iam-frontend:
    name: iam-frontend
    driver: bridge
  iam-backend:
    name: iam-backend
    driver: bridge
    internal: true
