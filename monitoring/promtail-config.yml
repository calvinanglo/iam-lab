server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Extract clean container name from Docker label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(?:iam-lab-|iam-)(.*)'
        target_label: container
      # Add compose service name as label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
    pipeline_stages:
      # Keycloak event parsing
      - match:
          selector: '{service=~"keycloak"}'
          stages:
            - regex:
                expression: 'type=(?P<event_type>[A-Z_]+).*realmId=(?P<realm>[a-z-]+)'
            - labels:
                event_type:
                realm:
      # Nginx access log parsing
      - match:
          selector: '{service=~"nginx"}'
          stages:
            - regex:
                expression: '^(?P<remote_addr>[\\d.]+) .* "(?P<method>[A-Z]+) (?P<path>[^ ]+) .* (?P<status>\\d{3}) '
            - labels:
                status:
      # SIEM receiver event parsing
      - match:
          selector: '{service=~"siem-receiver"}'
          stages:
            - json:
                expressions:
                  level: level
                  event_type: event.event_type
                  severity: event.severity
            - labels:
                level:
                severity:
      # OpenLDAP operation parsing
      - match:
          selector: '{service=~"openldap"}'
          stages:
            - regex:
                expression: 'conn=(?P<conn_id>\\d+) op=(?P<op_id>\\d+) (?P<ldap_op>[A-Z]+)'
            - labels:
                ldap_op:
