name: IAM Stack CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Lint & Validate ─────────��───────────────────────────────��──────────────
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate nginx config (dry-run)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            nginx:1.27-alpine nginx -t 2>&1

      - name: Validate Grafana dashboard JSON
        run: |
          for f in grafana/dashboards/*.json; do
            echo "Validating $f"
            python3 -c "import json,sys; json.load(open('$f')); print('  OK')"
          done

      - name: Validate Keycloak realm export JSON
        run: |
          python3 -c "
          import json
          with open('keycloak/enterprise-realm-export.json') as f:
              data = json.load(f)
          assert data['realm'] == 'enterprise', 'Realm name mismatch'
          assert data.get('bruteForceProtected') is True, 'Brute force must be enabled'
          assert 'length' in data.get('passwordPolicy', ''), 'Password policy missing'
          print('Realm export: OK')
          "

      - name: Validate promtail config YAML
        run: |
          python3 -c "
          import yaml, sys
          with open('monitoring/promtail-config.yml') as f:
              yaml.safe_load(f)
          print('promtail-config.yml: valid YAML')
          "

      - name: Validate .env.example exists
        run: |
          [ -f .env.example ] && echo ".env.example: OK" || (echo "MISSING: .env.example" && exit 1)

      - name: Check secrets not committed
        run: |
          echo "Checking for committed secrets..."
          if git show HEAD -- .env 2>/dev/null | grep -qE '^(\+[^+])'; then
            echo "ERROR: .env file changes detected in commit"
            exit 1
          fi
          if find . -name "*.key" -not -path "./.git/*" | xargs -I{} git ls-files --error-unmatch {} 2>/dev/null; then
            echo "ERROR: private key file tracked by git"
            exit 1
          fi
          if find . -name "*.tfvars" -not -name "*.example*" | xargs -I{} git ls-files --error-unmatch {} 2>/dev/null; then
            echo "ERROR: terraform vars file tracked by git"
            exit 1
          fi
          echo "No committed secrets detected."

  # ── Python Lint & Syntax ──────────────────────────────────────────────────
  python-lint:
    name: Python Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests flake8 flask

      - name: Flake8 lint — all Python scripts
        run: |
          flake8 \
            scripts/iam_lifecycle.py \
            scripts/jit_access.py \
            scripts/siem_forwarder.py \
            siem-receiver/app.py \
            siem-forwarder/siem_forwarder.py \
            tests/conftest.py \
            tests/test_integration.py \
            --max-line-length=120 \
            --ignore=E501,W503
          echo "Flake8: PASS"

      - name: Syntax check — all Python files
        run: |
          for f in scripts/iam_lifecycle.py scripts/jit_access.py scripts/siem_forwarder.py \
                   siem-receiver/app.py siem-forwarder/siem_forwarder.py \
                   tests/conftest.py tests/test_integration.py; do
            python3 -m py_compile "$f"
            echo "  OK: $f"
          done
          echo "Syntax check: PASS"

      - name: Bash syntax check
        run: |
          for f in scripts/healthcheck.sh scripts/backup.sh scripts/restore.sh \
                   certs/generate-certs.sh ldap/bootstrap.sh; do
            bash -n "$f"
            echo "  OK: $f"
          done
          echo "Bash syntax: PASS"

  # ── Container Image Security Scan ───���─────────────────────────────────────
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - quay.io/keycloak/keycloak:26.2
          - postgres:16-alpine
          - nginx:1.27-alpine
          - grafana/grafana:11.5.2
          - grafana/loki:3.4.2
          - gitea/gitea:1.23
          - nextcloud:30-apache
          - osixia/openldap:1.5.0
    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: docker pull ${{ matrix.image }}

      - name: Trivy scan — ${{ matrix.image }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: sarif
          output: trivy-${{ strategy.job-index }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ strategy.job-index }}.sarif
          category: trivy-${{ matrix.image }}

  # ── Stack Smoke Test ───────────────────────────────────────────────────────
  stack-smoke:
    name: Stack Smoke Test
    runs-on: ubuntu-latest
    needs: [validate, python-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Generate self-signed certs (CI environment)
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -keyout certs/server.key \
            -out certs/server.crt -days 1 -nodes \
            -subj "/CN=keycloak.iam-lab.local" \
            -addext "subjectAltName=DNS:keycloak.iam-lab.local,DNS:grafana.iam-lab.local,DNS:nextcloud.iam-lab.local,DNS:gitea.iam-lab.local"
          cp certs/server.crt certs/ca.crt

      - name: Create CI .env
        run: |
          cat > .env << 'EOF'
          KC_HOSTNAME=keycloak.iam-lab.local
          KEYCLOAK_ADMIN=admin
          KEYCLOAK_ADMIN_PASSWORD=ci-bootstrap-admin
          KEYCLOAK_SUPERADMIN_USER=iam-superadmin
          KEYCLOAK_SUPERADMIN_PASSWORD=ci-superadmin-password
          POSTGRES_DB=keycloak
          POSTGRES_USER=keycloak
          POSTGRES_PASSWORD=ci-postgres-password
          KC_DB_PASSWORD=ci-postgres-password
          POSTGRES_MAX_CONNECTIONS=50
          LDAP_ORGANISATION=IAM Lab
          LDAP_DOMAIN=rbclab.local
          LDAP_ADMIN_PASSWORD=ci-ldap-admin
          LDAP_CONFIG_PASSWORD=ci-ldap-config
          LDAP_READONLY_USER_PASSWORD=ci-ldap-readonly
          LDAP_USER_DEFAULT_PASSWORD=ChangeMe123!
          GF_SECURITY_ADMIN_USER=admin
          GF_SECURITY_ADMIN_PASSWORD=ci-grafana-admin
          GF_SECURITY_SECRET_KEY=ci-grafana-secret-key-32chars-pad
          GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=ci-grafana-oauth-secret
          NEXTCLOUD_ADMIN_USER=ncadmin
          NEXTCLOUD_ADMIN_PASSWORD=ci-nextcloud-admin
          GITEA_OAUTH_CLIENT_SECRET=ci-gitea-oauth-secret
          GITEA_ADMIN_USER=gitea-admin
          GITEA_ADMIN_PASSWORD=ci-gitea-admin
          EOF

      - name: Add hosts entries
        run: |
          echo "127.0.0.1 keycloak.iam-lab.local" | sudo tee -a /etc/hosts
          echo "127.0.0.1 grafana.iam-lab.local"  | sudo tee -a /etc/hosts
          echo "127.0.0.1 nextcloud.iam-lab.local" | sudo tee -a /etc/hosts
          echo "127.0.0.1 gitea.iam-lab.local"     | sudo tee -a /etc/hosts

      - name: Build custom images
        run: docker compose build

      - name: Start core services (KC + DB + LDAP)
        run: |
          docker compose up -d keycloak-db openldap keycloak
          echo "Waiting for Keycloak to become healthy..."

      - name: Wait for Keycloak health
        timeout-minutes: 5
        run: |
          until curl -sk https://keycloak.iam-lab.local:8443/realms/master/.well-known/openid-configuration \
            | grep -q '"issuer"'; do
            echo "  waiting..."
            sleep 10
          done
          echo "Keycloak is healthy."

      - name: Verify Keycloak OIDC discovery
        run: |
          curl -sk https://keycloak.iam-lab.local:8443/realms/master/.well-known/openid-configuration \
            | grep -q '"authorization_endpoint"'
          echo "OIDC discovery: PASS"

      - name: Verify admin token obtainable
        run: |
          TOKEN=$(curl -sk -X POST \
            https://keycloak.iam-lab.local:8443/realms/master/protocol/openid-connect/token \
            --data-urlencode "grant_type=password" \
            --data-urlencode "client_id=admin-cli" \
            --data-urlencode "username=admin" \
            --data-urlencode "password=ci-bootstrap-admin" \
            | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
          [ -n "$TOKEN" ] && echo "Admin token: PASS" || (echo "Admin token: FAIL" && exit 1)

      - name: Verify enterprise realm auto-imported
        run: |
          TOKEN=$(curl -sk -X POST \
            https://keycloak.iam-lab.local:8443/realms/master/protocol/openid-connect/token \
            --data-urlencode "grant_type=password" \
            --data-urlencode "client_id=admin-cli" \
            --data-urlencode "username=admin" \
            --data-urlencode "password=ci-bootstrap-admin" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          REALM=$(curl -sk -H "Authorization: Bearer $TOKEN" \
            https://keycloak.iam-lab.local:8443/admin/realms/enterprise \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('realm',''))")
          [ "$REALM" = "enterprise" ] && echo "Realm auto-import: PASS" || (echo "Realm auto-import: FAIL — got '$REALM'" && exit 1)

      - name: Start remaining services
        run: docker compose up -d
        continue-on-error: true

      - name: Run healthcheck
        run: |
          sleep 30
          bash scripts/healthcheck.sh || true

      - name: Collect container logs on failure
        if: failure()
        run: |
          docker compose logs --tail=50 keycloak
          docker compose logs --tail=20 keycloak-db
          docker compose logs --tail=20 openldap

      - name: Tear down
        if: always()
        run: docker compose down -v
